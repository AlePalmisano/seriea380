function ovrColor(o) {
  if (o >= 87) return "#c9a84c";
  if (o >= 82) return G;
  if (o >= 75) return "#2d7d46";
  return GREY;
}

// Get unfilled slot indices for this formation
function unfilledSlots(formation, drafted) {
  const slots = FORMATIONS[formation];
  const usedIdx = new Set(drafted.map(d => d.slotIdx));
  return slots.map((pos, idx) => ({ pos, idx })).filter(s => !usedIdx.has(s.idx));
}

// Can this player fill ANY remaining slot?
function playerCanFillAny(player, formation, drafted) {
  return unfilledSlots(formation, drafted).some(s => canFillSlot(player, s.pos));
}

// Position families — slot label → which primary positions can fill it
// Based on 38-0 logic: families are close relatives, not full cross-filling
const SLOT_FAMILIES = {
  GK:  ["GK"],
  CB:  ["CB"],
  RB:  ["RB","RWB","RM"],
  LB:  ["LB","LWB","LM"],
  RWB: ["RWB","RB","RM"],
  LWB: ["LWB","LB","LM"],
  CDM: ["CDM","CM"],
  CM:  ["CM","CDM","CAM","RM","LM"],
  CAM: ["CAM","CM","CF","ST"],
  RM:  ["RM","RW","RB","RWB","CM"],
  LM:  ["LM","LW","LB","LWB","CM"],
  RW:  ["RW","RM","CAM","ST"],
  LW:  ["LW","LM","CAM","ST"],
  CF:  ["CF","CAM","ST","CM"],
  ST:  ["ST","CF","CAM"],
};

// Is player eligible for a given slot?
// Uses player.ap (all FIFA positions) if available, else SLOT_FAMILIES fallback
function canFillSlot(player, slotPos) {
  const allPos = player.ap || [player.p];
  // A player can fill the slot if any of their positions is in that slot's family
  const family = SLOT_FAMILIES[slotPos] || [slotPos];
  return allPos.some(pos => family.includes(pos));
}

// All slots this player can fill — exact match = primary pos matches slot
function getEligibleSlots(player, formation, drafted) {
  return unfilledSlots(formation, drafted)
    .filter(s => canFillSlot(player, s.pos))
    .map(s => ({ ...s, exact: s.pos === player.p }));
}

// Best slot idx for this player (exact match preferred, fallback to first)
function bestSlotForPlayer(player, formation, drafted) {
  const candidates = getEligibleSlots(player, formation, drafted);
  if (candidates.length === 0) return null;
  const exact = candidates.find(s => s.exact);
  return exact ? exact.idx : candidates[0].idx;
}

// Get weakest club in a season
function getWeakestClub(season) {
  const clubs = SEASON_CLUBS[season];
  if (!clubs) return null;
  return Object.entries(clubs).reduce((w, [club, s]) => s.avg < w[1].avg ? [club, s] : w);
}

// Compute base squad ratings from drafted players + formation
function squadRatings(drafted, formation) {
  const slots = FORMATIONS[formation];
  const groups = { att: [], mid: [], def: [] };
  drafted.forEach(p => {
    const slotPos = slots[p.slotIdx];
    const exactMatch = p.p === slotPos;
    const secondaryMatch = !exactMatch && (p.ap || []).includes(slotPos);
    const fitPenalty = exactMatch ? 0 : secondaryMatch ? 2 : 4;
    const adj = p.o - fitPenalty;
    if (ATT_SLOTS.has(slotPos)) groups.att.push(adj);
    else if (MID_SLOTS.has(slotPos)) groups.mid.push(adj);
    else groups.def.push(adj);
  });
  const avg = arr => arr.length ? arr.reduce((a,b)=>a+b,0)/arr.length : 72;
  const max = arr => arr.length ? Math.max(...arr) : 72;
  const nAtt = slots.filter(s => ATT_SLOTS.has(s)).length;
  const nMid = slots.filter(s => MID_SLOTS.has(s)).length;
  const nDef = slots.filter(s => DEF_SLOTS.has(s) || s==="GK").length;
  const wAvg = (nAtt*avg(groups.att) + nMid*avg(groups.mid) + nDef*avg(groups.def)) / (nAtt+nMid+nDef);
  return {
    avgAtt: avg(groups.att), maxAtt: max(groups.att),
    avgMid: avg(groups.mid), maxMid: max(groups.mid),
    avgDef: avg(groups.def), maxDef: max(groups.def),
    overall: wAvg,
  };
}

// Per-game effective rating: blend group avg and star player, weight drawn from U(0.6, 0.9)
function gameRatings(base) {
  const w = 0.6 + Math.random() * 0.3; // U(0.6, 0.9) — weight on group avg
  return {
    att: w * base.avgAtt + (1 - w) * base.maxAtt,
    mid: w * base.avgMid + (1 - w) * base.maxMid,
    def: w * base.avgDef + (1 - w) * base.maxDef,
  };
}

// Simulate full season against real 19 opponents
function simulateSeason(drafted, formation, season, replacedClub, isDecade) {
  const base = squadRatings(drafted, formation);
  // expose att/mid/def as averages for the results screen
  const my = {
    att: base.avgAtt, mid: base.avgMid, def: base.avgDef, overall: base.overall,
  };
  // Decade mode: play against all 19 other decade XIs
  // Normal mode: play against real clubs from chosen season
  const leagueSource = isDecade ? DECADE_LEAGUE : (SEASON_CLUBS[season] || {});
  const opponents = Object.entries(leagueSource)
    .filter(([club]) => !replacedClub || club !== replacedClub)
    .sort((a,b) => b[1].avg - a[1].avg);

  const schedule = [];
  for (const [club, stats] of opponents) {
    schedule.push({ club, stats, home: true });
    schedule.push({ club, stats, home: false });
  }
  for (let i = schedule.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [schedule[i], schedule[j]] = [schedule[j], schedule[i]];
  }

  const results = [];
  let w=0, d=0, l=0, gf=0, ga=0;
  for (const game of schedule) {
    const gr = gameRatings(base);
    const hb = game.home ? 1.5 : -0.5;
    const myXg  = 1.1 + (gr.att  - game.stats.def) * 0.065 + hb * 0.15;
    const oppXg = 1.1 + (game.stats.att - gr.def)   * 0.065 - hb * 0.10;
    const N = 1.6;
    const myGoals  = Math.max(0, Math.round(myXg  + (Math.random()+Math.random()-1)*N));
    const oppGoals = Math.max(0, Math.round(oppXg + (Math.random()+Math.random()-1)*N));
    gf += myGoals; ga += oppGoals;
    if (myGoals > oppGoals) { w++; results.push({ r:"W", opp: game.club, mg: myGoals, og: oppGoals, home: game.home }); }
    else if (myGoals === oppGoals) { d++; results.push({ r:"D", opp: game.club, mg: myGoals, og: oppGoals, home: game.home }); }
    else { l++; results.push({ r:"L", opp: game.club, mg: myGoals, og: oppGoals, home: game.home }); }
  }
  return { w, d, l, pts: w*3+d, gf, ga, gd: gf-ga, results, my, opponents };
}

function getComment(result, ourPos) {
  if (result.w === 38) return "Mathematically impossible. We're calling Guinness.";
  if (result.l === 0)  return "Not even a loss. Did you hack this?";
  if (ourPos === 1)    return "Scudetto secured. Mancini would be proud.";
  if (ourPos === 2)    return "So close. Second place is just the first loser, but still.";
  if (ourPos === 3)    return "Champions League football. Your chairman is cautiously satisfied.";
  if (ourPos === 4)    return "Fourth. Europa League. Nobody's putting up a statue.";
  if (ourPos <= 7)     return "Conference League territory. A participation trophy awaits.";
  if (ourPos <= 10)    return "Mid-table. The press called it 'a season of transition'.";
  if (ourPos <= 14)    return "Comfortable mid-table. Nobody got fired. Barely.";
  if (ourPos <= 17)    return "Relegation scare averted. The ultras are not impressed.";
  if (ourPos === 18)   return "Down. The squad you built goes directly to Serie B.";
  if (ourPos === 19)   return "Dead last. Historically bad. Chapeau.";
  return "How.";
}

function getBadge(res, pos) {
  if (res.w === 38)  return { label:"GOAT SEASON",      sub:"38-0-0 · The perfect season",      color: GOLD };
  if (res.l === 0)   return { label:"INVINCIBILI",       sub:"Unbeaten all season",              color: G };
  if (pos === 1)     return { label:"CAMPIONI",          sub:"Scudetto winners 🏆",             color: G };
  if (pos <= 4)      return { label:"CHAMPIONS LEAGUE",  sub:`${pos}${pos===2?"nd":"rd"} — Champions League`, color: "#3a7abf" };
  if (pos <= 7)      return { label:"EUROPA LEAGUE",     sub:`${pos}th place — European football`, color: "#e07b39" };
  if (pos <= 14)     return { label:"MID TABLE",         sub:`${pos}th place`, color: GREY };
  if (pos <= 17)     return { label:"LOTTA SALVEZZA",    sub:`${pos}th place — relegation battle`, color: "#c0392b" };
  return               { label:"RETROCESSIONE",         sub:`${pos}th — relegated to Serie B`,  color: "#8b0000" };
}

  };

    <button onClick={onClick} disabled={disabled} style={{

      letterSpacing:"0.07em", textTransform:"uppercase",
      padding:"0.75rem 1.6rem", borderRadius:2,
      opacity: disabled?0.45:1, width: full?"100%":"auto",
      ...V[variant], ...style
    }}>{children}</button>
  );
}

function Eyebrow({ children }) {

// ── ROLE AVERAGES BAR ──────────────────────────────────────────────────────
// Shows ATT / MID / DEF running averages with coloured bars
function RoleBar({ drafted, formation, slots, expertMode, compact }) {
  if (!drafted || drafted.length === 0) return null;
  const ratings = squadRatings(drafted, formation);

  // Count filled slots per group
  const groups = { att:[], mid:[], def:[] };
  drafted.forEach(p => {
    const slotPos = slots[p.slotIdx];
    if (ATT_SLOTS.has(slotPos)) groups.att.push(p);
    else if (MID_SLOTS.has(slotPos)) groups.mid.push(p);
    else groups.def.push(p);
  });

  // How many slots of each type exist in the formation
  const totalSlots = FORMATIONS[formation];
  const totalAtt = totalSlots.filter(s => ATT_SLOTS.has(s)).length;
  const totalMid = totalSlots.filter(s => MID_SLOTS.has(s)).length;
  const totalDef = totalSlots.filter(s => DEF_SLOTS.has(s) || s === "GK").length;

  const items = [
    { label:"DEF", val: groups.def.length ? Math.round(ratings.def) : null, color:"#3a7abf" },
    { label:"MID", val: groups.mid.length ? Math.round(ratings.mid) : null, color: GOLD },
    { label:"ATT", val: groups.att.length ? Math.round(ratings.att) : null, color:"#c0392b" },
  ];

  const overall = Math.round(ratings.overall);

  return (
    <div style={{ display:"flex", gap: compact ? "0.35rem" : "0.5rem", alignItems:"stretch" }}>
      {items.map(({ label, val, color }) => (
        <div key={label} style={{
          flex:1, background: WHITE, border:`1.5px solid ${val ? color+"40" : BORDER}`,
          borderRadius:4, padding: compact ? "0.3rem 0.35rem" : "0.5rem 0.6rem",
          textAlign:"center",
        }}>
          <div style={{ fontSize: compact ? "0.52rem" : "0.56rem", fontWeight:700,
            textTransform:"uppercase", letterSpacing:"0.07em",
            color: val ? color : GREY, marginBottom:2 }}>{label}</div>
          {val && !expertMode ? (
            <div style={{ fontFamily:"'Georgia',serif", fontWeight:700,
              fontSize: compact ? "1.05rem" : "1.2rem", lineHeight:1,
              color: val >= 83 ? GOLD : val >= 77 ? G : GREY }}>
              {val}
            </div>
          ) : val && expertMode ? (
            <div style={{ fontSize:"0.6rem", color:GREY }}>●</div>
          ) : (
            <div style={{ fontSize: compact?"0.6rem":"0.65rem", color:BORDER }}>—</div>
          )}
        </div>
      ))}
      {/* Overall */}
      <div style={{
        background: overall >= 83 ? GOLD : overall >= 77 ? G : GREY,
        borderRadius:4, padding: compact ? "0.3rem 0.45rem" : "0.5rem 0.7rem",
        textAlign:"center", minWidth: compact ? 36 : 44,
      }}>
        <div style={{ fontSize: compact?"0.52rem":"0.56rem", fontWeight:700,
          textTransform:"uppercase", letterSpacing:"0.07em",
          color:"rgba(255,255,255,0.75)", marginBottom:2 }}>OVR</div>
        {!expertMode ? (
          <div style={{ fontFamily:"'Georgia',serif", fontWeight:700,
            fontSize: compact?"1.05rem":"1.2rem", lineHeight:1, color:WHITE }}>
            {overall}
          </div>
        ) : (
          <div style={{ fontSize:"0.6rem", color:"rgba(255,255,255,0.6)" }}>●</div>
        )}
      </div>
    </div>
  );
}

// ── DRAW WHEEL (generic) ──────────────────────────────────────────────────
function SpinWheel({ items, onResult, labelFn, used, label }) {
  const [spinning, setSpinning] = useState(false);
  const [display, setDisplay] = useState(null);
  const ref = useRef(null);

  function doDraw() {
    if (spinning) return;
    setSpinning(true);
    setDisplay(null);
    let ticks = 0;
    const total = 12 + Math.floor(Math.random() * 6);
    ref.current = setInterval(() => {
      setDisplay(items[Math.floor(Math.random() * items.length)]);
      ticks++;
      if (ticks >= total) {
        clearInterval(ref.current);
        const available = items.filter(x => !used || !used.has(x));
        const final = available.length > 0
          ? available[Math.floor(Math.random() * available.length)]
          : items[Math.floor(Math.random() * items.length)];
        setDisplay(final);
        setSpinning(false);
        setTimeout(() => onResult(final), 350);
      }
    }, 70);
  }

  return (
    <div style={{ textAlign:"center" }}>
      <div style={{
        background:WHITE, border:`2px solid ${spinning?GOLD:display&&!spinning?G:BORDER}`,
        borderRadius:6, padding:"1.1rem 1rem", marginBottom:"0.75rem",
        minHeight:80, display:"flex", flexDirection:"column",
        alignItems:"center", justifyContent:"center", transition:"border-color 0.2s",
      }}>
        {display ? (
          <>
            <div style={{ fontSize:"0.58rem", fontWeight:700, textTransform:"uppercase", letterSpacing:"0.14em", color:GREY, marginBottom:3 }}>
              {spinning ? "Drawing…" : "You got"}
            </div>
            <div style={{ fontFamily:"'Georgia',serif", fontSize:"1.25rem", fontWeight:700, color:G, lineHeight:1.1 }}>
              {labelFn ? labelFn(display) : display}
            </div>
          </>
        ) : (
          <div style={{ color:GREY, fontSize:"0.82rem" }}>{label || "Draw"}</div>
        )}
      </div>
      {!spinning && !display && (
        <Btn onClick={doDraw} full>Draw</Btn>
      )}
      {spinning && <Btn disabled full>Drawing…</Btn>}
    </div>
  );
}

  const [drafted, setDrafted] = useState([]);

  const [usedKeys, setUsedKeys] = useState([]);
  const [draftedNames, setDraftedNames] = useState([]);

  const slots = FORMATIONS[formation];
  const remaining = unfilledSlots(formation, drafted);
  const nextSlotPos = remaining.length > 0 ? remaining[0].pos : null;

  function handleSpinResult(key) {
    setUsedKeys(prev => [...prev, key]);
    setCurrentKey(key);
    setPhase("pick");
  }

  function handleDraft(player, slotIdx) {
    const idx = slotIdx !== null && slotIdx !== undefined
      ? slotIdx
      : bestSlotForPlayer(player, formation, drafted);
    if (idx === null) return;
    setDraftedNames(prev => [...prev, player.n]);
    const newDrafted = [...drafted, { ...player, slotIdx: idx }];

    } else {
      setPhase("spin");
      setCurrentKey(null);

    ? (isDecade ? (DECADE_SQUADS[currentKey] || []) : (SQUADS_DATA[currentKey] || []))

            const filled = drafted.find(d => d.slotIdx===i);

              background: filled ? G : i===nextSlotIdx ? GOLD : BORDER,
            }} />;

      </div>

      {/* ── PITCH (compact, full width) ── */}

                {isDecade ? currentKey : currentKey.split("|")[0]}
                {!isDecade && <span style={{ color:GREY, fontSize:"0.78rem", fontWeight:400, marginLeft:"0.4rem" }}>{currentKey.split("|")[1]}</span>}
                {isDecade && <span style={{ color:GREY, fontSize:"0.78rem", fontWeight:400, marginLeft:"0.4rem" }}>Decade XI</span>}
              </div>
              {!config?.expertMode && (
                <div style={{ fontSize:"0.62rem", color:GREY, marginTop:1 }}>
                  Filling <strong style={{color:INK}}>{nextSlotPos}</strong> · greyed = ineligible
                </div>
              )}
            </div>

          </div>

          {/* Player list */}
          <div style={{ display:"grid", gap:"0.25rem", maxHeight:380, overflowY:"auto" }}>
            {[...squadPlayers]
              .map(p => {
                const eligible = getEligibleSlots(p, formation, drafted);
                const already = draftedNames.includes(p.n);
                return { p, eligible, already, available: !already && eligible.length > 0 };
              })
              .sort((a, b) => {
                if (a.available !== b.available) return a.available ? -1 : 1;
                if (config?.expertMode) {
                  const POS_ORD = ["GK","CB","RB","LB","RWB","LWB","CDM","CM","CAM","RM","LM","RW","LW","CF","ST"];
                  return (POS_ORD.indexOf(a.p.p)??99) - (POS_ORD.indexOf(b.p.p)??99);
                }
                return b.p.o - a.p.o;
              })
              .map(({ p, eligible, already, available }, i) => (
                <PlayerCard
                  key={i}
                  player={p}
                  onDraft={handleDraft}
                  canDraft={available}
                  alreadyDrafted={already}
                  expertMode={config?.expertMode}
                  eligibleSlots={eligible}
                />
              ))
            }
          </div>
        </div>
      )}
    </div>
  );
}

// ── RESULTS ────────────────────────────────────────────────────────────────
function ResultsScreen({ formation, season, replacedClub, drafted, config, onRestart }) {
  const [result] = useState(() => simulateSeason(drafted, formation, season, replacedClub, config?.decadeMode));
  const [showAll, setShowAll] = useState(false);
  const slots = FORMATIONS[formation];

  // Build league table: H2H among the 19 opponents, then insert Your XI results
  const oppClubs = result.opponents.map(([club, stats]) => ({ club, att:stats.att, def:stats.def }));

  // Seeded RNG for stable table
  let _seed = oppClubs.reduce((s,c) => s + c.club.length * (c.att|0), 0) | 0;
  const srng = () => { _seed = (_seed * 1664525 + 1013904223) & 0xffffffff; return (_seed>>>0)/0xffffffff; };

  // Init records for 19 opponents
  const records = {};
  oppClubs.forEach(c => { records[c.club] = { club:c.club, w:0,d:0,l:0,gf:0,ga:0, us:false }; });

  // Simulate every opponent vs opponent pair (18×2 = 36 games each)
  for (let i = 0; i < oppClubs.length; i++) {
    for (let j = 0; j < oppClubs.length; j++) {
      if (i === j) continue;
      const home = oppClubs[i], away = oppClubs[j];
      const hxg = 1.1 + (home.att - away.def) * 0.065 + 1.5 * 0.15;
      const axg = 1.1 + (away.att - home.def) * 0.065 - 1.5 * 0.10;
      const N = 1.6;
      const hg = Math.max(0, Math.round(hxg + (srng()+srng()-1)*N));
      const ag = Math.max(0, Math.round(axg + (srng()+srng()-1)*N));
      records[home.club].gf += hg; records[home.club].ga += ag;
      records[away.club].gf += ag; records[away.club].ga += hg;
      if (hg > ag) { records[home.club].w++; records[away.club].l++; }
      else if (hg === ag) { records[home.club].d++; records[away.club].d++; }
      else { records[home.club].l++; records[away.club].w++; }
    }
  }

  // Now add Your XI's REAL results vs each opponent (from the actual simulation)
  result.results.forEach(r => {
    const opp = records[r.opp];
    if (!opp) return;
    if (r.r === "W") { opp.l++; opp.ga += r.mg; opp.gf += r.og; }
    else if (r.r === "D") { opp.d++; opp.ga += r.mg; opp.gf += r.og; }
    else { opp.w++; opp.ga += r.mg; opp.gf += r.og; }
  });

  // Add Your XI with real record
  records["Your XI"] = {
    club:"Your XI", us:true,
    w:result.w, d:result.d, l:result.l,
    gf:result.gf, ga:result.ga,
  };

  const tableRows = Object.values(records)
    .map(r => ({ ...r, pts: r.w*3+r.d, gd: r.gf-r.ga }))
    .sort((a,b) => b.pts-a.pts || b.gd-a.gd || b.gf-a.gf);

  const ourPos = tableRows.findIndex(r=>r.us) + 1;
  const badge = getBadge(result, ourPos);
  const displayRows = showAll ? tableRows : tableRows.slice(0, Math.max(ourPos+1, 6));

  return (
    <div style={{ maxWidth:560, margin:"0 auto", padding:"1rem 0.85rem 3rem" }}>

      {/* ── HERO BADGE ── */}
      <div style={{ textAlign:"center", padding:"2rem 1rem 1.5rem", borderBottom:`1px solid ${BORDER}`, marginBottom:"1.5rem" }}>
        <Eyebrow>Serie A {season} · {formation} · {config?.expertMode?"Expert":"Classic"}</Eyebrow>
        <div style={{ fontFamily:"'Georgia',serif", fontSize:"clamp(3.5rem,14vw,7rem)", fontWeight:700, lineHeight:0.82,
          color: result.w===38?GOLD:G }}>
          {result.w}<span style={{ color:GOLD }}>-{result.d}</span>-{result.l}
        </div>
        <div style={{ fontSize:"0.68rem", color:GREY, marginTop:"0.3rem", letterSpacing:"0.1em" }}>W — D — L</div>
        <div style={{
          display:"inline-block", marginTop:"1rem",
          background:badge.color, color:badge.color===GOLD?INK:WHITE,
          fontWeight:700, fontSize:"0.9rem", letterSpacing:"0.12em",
          textTransform:"uppercase", padding:"0.55rem 1.4rem", borderRadius:2,
        }}>{badge.label}</div>
        <div style={{ fontSize:"0.82rem", color:GREY, marginTop:"0.4rem" }}>{badge.sub}</div>
        <div style={{ fontSize:"0.8rem", color:GREY, fontStyle:"italic", marginTop:"0.5rem", maxWidth:"34ch", margin:"0.5rem auto 0" }}>
          "{getComment(result, ourPos)}"
        </div>
        <div style={{ display:"flex", gap:"0.75rem", justifyContent:"center", marginTop:"0.75rem", flexWrap:"wrap" }}>
          {[["Pts",result.pts],[`${ourPos}${ourPos===1?"st":ourPos===2?"nd":ourPos===3?"rd":"th"}`,"Place"],
            ["GF",result.gf],["GA",result.ga],["GD",result.gd>0?"+"+result.gd:result.gd]].map(([l,v])=>(
            <div key={l} style={{ textAlign:"center", minWidth:"2.5rem" }}>
              <div style={{ fontFamily:"'Georgia',serif", fontSize:"1.3rem", fontWeight:700, color:G, lineHeight:1 }}>{v}</div>
              <div style={{ fontSize:"0.55rem", fontWeight:600, textTransform:"uppercase", letterSpacing:"0.08em", color:GREY, marginTop:2 }}>{l}</div>
            </div>
          ))}
        </div>
        <div style={{ fontSize:"0.68rem", color:GREY, marginTop:"0.5rem", marginBottom:"0.75rem" }}>
          Replaced <strong style={{color:INK}}>{replacedClub}</strong>
        </div>
      </div>

      {/* ── ROLE AVERAGES ── */}
      <div style={{ marginBottom:"1.5rem" }}>
        <RoleBar drafted={drafted} formation={formation} slots={slots} expertMode={false} />
      </div>

      {/* ── FORM STRIP ── */}
      <div style={{ marginBottom:"1.5rem" }}>
        <div style={{ fontSize:"0.58rem", fontWeight:700, textTransform:"uppercase", letterSpacing:"0.12em", color:GREY, marginBottom:"0.4rem" }}>Season Form</div>
        <div style={{ display:"flex", flexWrap:"wrap", gap:3 }}>
          {result.results.map((r,i) => (
            <div key={i} title={`${r.home?"H":"A"} vs ${r.opp} ${r.mg}-${r.og}`} style={{
              width:17, height:17, borderRadius:2, fontSize:"0.5rem", fontWeight:700,
              display:"flex", alignItems:"center", justifyContent:"center", color:WHITE,
              background: r.r==="W"?G:r.r==="D"?GOLD:"#c0392b", cursor:"default",
            }}>{r.r}</div>
          ))}
        </div>
      </div>

      {/* ── LEAGUE TABLE ── */}
      <div style={{ marginBottom:"1.5rem" }}>
        <div style={{ fontSize:"0.58rem", fontWeight:700, textTransform:"uppercase", letterSpacing:"0.12em", color:GREY, marginBottom:"0.5rem" }}>
          Serie A {season} Table
        </div>
        <div style={{ border:`1px solid ${BORDER}`, borderRadius:4, overflow:"hidden" }}>
          {/* Header — 7 cols: # Club W D L GD Pts */}
          <div style={{ display:"grid", gridTemplateColumns:"1.6rem 1fr 1.8rem 1.8rem 1.8rem 2.4rem 2.4rem", gap:"0.2rem",
            padding:"0.35rem 0.6rem", background:"#f0ebe0",
            fontSize:"0.54rem", fontWeight:700, textTransform:"uppercase", letterSpacing:"0.07em", color:GREY }}>
            <span>#</span><span>Club</span>
            <span style={{textAlign:"center"}}>W</span>
            <span style={{textAlign:"center"}}>D</span>
            <span style={{textAlign:"center"}}>L</span>
            <span style={{textAlign:"center"}}>GD</span>
            <span style={{textAlign:"right"}}>Pts</span>
          </div>
          {displayRows.map((row, i) => (
            <div key={row.club} style={{
              display:"grid", gridTemplateColumns:"1.6rem 1fr 1.8rem 1.8rem 1.8rem 2.4rem 2.4rem", gap:"0.2rem",
              padding:"0.35rem 0.6rem", alignItems:"center",
              background: row.us ? "rgba(26,107,58,0.08)" : i%2===0?WHITE:"#faf8f4",
              borderTop:`1px solid ${BORDER}`,
            }}>
              <span style={{ fontSize:"0.62rem", color: i<4?"#3a7abf":i>=17?"#c0392b":GREY, fontWeight:700 }}>{i+1}</span>
              <span style={{ fontSize:"0.75rem", color: row.us?G:INK, whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis",
                fontWeight: row.us?700:400, display:"flex", alignItems:"center", gap:"0.25rem" }}>
                {row.us && <span style={{ fontSize:"0.5rem", background:G, color:WHITE, padding:"0.08rem 0.25rem", borderRadius:2, flexShrink:0, letterSpacing:"0.04em" }}>YOU</span>}
                {row.club}
              </span>
              <span style={{ fontSize:"0.7rem", color:INK, textAlign:"center", fontWeight:row.us?700:400 }}>{row.w}</span>
              <span style={{ fontSize:"0.7rem", color:INK, textAlign:"center", fontWeight:row.us?700:400 }}>{row.d}</span>
              <span style={{ fontSize:"0.7rem", color:INK, textAlign:"center", fontWeight:row.us?700:400 }}>{row.l}</span>
              <span style={{ fontSize:"0.7rem", color: row.gd>0?G:row.gd<0?"#c0392b":GREY, textAlign:"center", fontWeight:700 }}>
                {row.gd>0?"+":""}{row.gd}
              </span>
              <span style={{ fontFamily:"'Georgia',serif", fontSize:"0.82rem", fontWeight:700, color:row.us?G:INK, textAlign:"right" }}>{row.pts}</span>
            </div>
          ))}
        </div>
        {tableRows.length > displayRows.length && (
          <button onClick={()=>setShowAll(true)} style={{ marginTop:"0.4rem", background:"none", border:"none",
            color:GREY, fontSize:"0.72rem", cursor:"pointer", textDecoration:"underline" }}>
            Show full table ({tableRows.length} clubs)
          </button>
        )}
      </div>

      {/* ── YOUR XI ── */}
      <div style={{ marginBottom:"1.75rem" }}>
        <div style={{ fontSize:"0.58rem", fontWeight:700, textTransform:"uppercase", letterSpacing:"0.12em", color:GREY, marginBottom:"0.5rem" }}>
          Your XI · {formation}
        </div>
        <div style={{ border:`1px solid ${BORDER}`, borderRadius:4, overflow:"hidden" }}>
          {[...drafted].sort((a,b)=>a.slotIdx-b.slotIdx).map((p,i)=>(
            <div key={i} style={{ display:"flex", alignItems:"center", gap:"0.5rem",
              padding:"0.38rem 0.6rem", background:i%2===0?WHITE:"#faf8f4",

                fontSize:"0.88rem", color:ovrColor(p.o), flexShrink:0 }}>{p.o}</span>

      </div>

      <div style={{ display:"flex", justifyContent:"center" }}>
        <Btn onClick={onRestart}>Start New Run →</Btn>
      </div>
    </div>
  );
}

// ── ROOT ───────────────────────────────────────────────────────────────────
function App() {
  const [screen, setScreen] = useState("landing");
  const [config, setConfig] = useState(null);
  const [formation, setFormation] = useState(null);
  const [season, setSeason] = useState(null);
  const [replacedClub, setReplacedClub] = useState(null);
  const [finalSquad, setFinalSquad] = useState(null);

  function startRun()       { setScreen("mode"); setConfig(null); setFormation(null); setSeason(null); setReplacedClub(null); setFinalSquad(null); }
  function pickMode(cfg)    { setConfig(cfg); setScreen("formation"); }
  function pickFormation(f) { setFormation(f); if (config?.decadeMode) { setSeason("2014-2026"); setReplacedClub("Cesena"); setScreen("draft"); } else { setScreen("season"); } }
  function confirmSeason(s, club) { setSeason(s); setReplacedClub(club); setScreen("draft"); }
  function completeDraft(squad)   { setFinalSquad(squad); setScreen("results"); }

  return (
    <div style={{ fontFamily:"'Inter',system-ui,sans-serif", background:CREAM, color:INK, minHeight:"100vh" }}>
      {screen !== "landing" && (
        <nav style={{ display:"flex", alignItems:"center", justifyContent:"space-between", padding:"0.7rem 1.25rem", borderBottom:`1px solid ${BORDER}`, background:CREAM, position:"sticky", top:0, zIndex:100 }}>
          <button onClick={() => setScreen("landing")} style={{ fontFamily:"'Georgia',serif", fontSize:"1.2rem", fontWeight:700, color:G, background:"none", border:"none", cursor:"pointer" }}>
            38<span style={{ color:GOLD }}>-0</span>
          </button>
          <div style={{ display:"flex", gap:"0.75rem", alignItems:"center", fontSize:"0.7rem", color:GREY }}>
            {config && <span style={{ textTransform:"uppercase", letterSpacing:"0.06em", fontWeight:600 }}>{config.title}</span>}
            {formation && <span>{formation}</span>}
            {season && <span>{season}</span>}
          </div>
          <button onClick={() => setScreen("landing")} style={{ fontSize:"0.7rem", color:GREY, background:"none", border:"none", cursor:"pointer", textDecoration:"underline" }}>← Home</button>
        </nav>
      )}
      {screen==="landing"    && <LandingPage onStart={startRun} />}
      {screen==="mode"       && <ModePicker onPick={pickMode} />}
      {screen==="formation"  && <FormationPicker onPick={pickFormation} />}
      {screen==="season"     && <SeasonSpin config={config} onConfirm={confirmSeason} />}
      {screen==="draft"      && <DraftScreen formation={formation} season={season} replacedClub={replacedClub} config={config} onComplete={completeDraft} />}
      {screen==="results"    && finalSquad && <ResultsScreen formation={formation} season={season} replacedClub={replacedClub} drafted={finalSquad} config={config} onRestart={startRun} />}
    </div>
  );
}


ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
  </script>
